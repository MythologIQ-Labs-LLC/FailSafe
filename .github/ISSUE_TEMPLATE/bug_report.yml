name: Bug Report
description: Report a bug or unexpected behavior in FailSafe
title: "[Bug]: "
labels: ["bug", "triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this bug! Please fill out the sections below to help us resolve it quickly.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Detailed steps to reproduce the behavior.
      placeholder: |
        1. Open VS Code with FailSafe extension active
        2. Run command '...'
        3. Open the Command Center / Monitor
        4. See error
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Your environment details. This helps us reproduce the issue.
      placeholder: |
        - OS: [e.g., Windows 11, macOS 14, Ubuntu 22.04]
        - VS Code version: [e.g., 1.90.0]
        - FailSafe version: [e.g., 5.1.0]
        - Node.js version: [e.g., 20.18.1]
        - Python version: [e.g., 3.12.0] (if relevant to qor-logic)
        - Governance mode: [observe / assist / enforce]
      render: markdown
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: |
        Paste any relevant log output from the Output panel (select "FailSafe" or "FailSafe (QorLogic)" channel).
        **Do not paste secrets, API keys, or credentials.**
      render: shell

  - type: dropdown
    id: component
    attributes:
      label: Affected Component
      description: Which FailSafe component is affected?
      options:
        - Monitor (sidebar)
        - Command Center (hub)
        - Sentinel (file watching / audits)
        - QoreLogic (governance / policies)
        - Skills (qor-* commands)
        - Trust Engine
        - Ledger / Checkpoints
        - MCP Server
        - SRE Dashboard
        - Brainstorm / Voice
        - Installation / Bootstrap
        - Other
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How severe is this bug?
      options:
        - Low - Minor inconvenience, workaround available
        - Medium - Functional impact, no workaround
        - High - Major feature broken, blocking workflow
        - Critical - Data loss, security issue, or crash
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Recordings
      description: |
        Add screenshots or screen recordings to help explain the issue.
        You can drag and drop images here.

  - type: textarea
    id: workaround
    attributes:
      label: Workaround
      description: Is there a temporary workaround?
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues for duplicates
          required: true
        - label: I have read the [documentation](https://github.com/MythologIQ/FailSafe/wiki)
          required: false
        - label: I can reproduce this issue consistently
          required: false
