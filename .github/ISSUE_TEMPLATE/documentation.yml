name: Documentation
description: Report documentation issues or suggest improvements
title: "[Docs]: "
labels: ["documentation"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Help us improve FailSafe documentation! This includes the Wiki, README, specification docs, and inline help.

  - type: dropdown
    id: type
    attributes:
      label: Type
      description: What type of documentation issue is this?
      options:
        - Missing documentation
        - Incorrect information
        - Unclear explanation
        - Typo or grammar
        - Outdated content (version mismatch)
        - Wiki improvement
        - Inline help improvement
        - Other
    validations:
      required: true

  - type: dropdown
    id: location
    attributes:
      label: Documentation Location
      description: Where is the documentation?
      options:
        - GitHub Wiki
        - README.md
        - docs/FAILSAFE_SPECIFICATION.md
        - docs/ROADMAP.md
        - CONTRIBUTING.md
        - SECURITY.md
        - Command Center (inline help)
        - Extension marketplace listing
        - Code comments / JSDoc
        - Other
    validations:
      required: true

  - type: input
    id: specific-location
    attributes:
      label: Specific Page / File / Section
      description: Where specifically? Include a link or file path.
      placeholder: "e.g., Wiki → Architecture Overview, or docs/FAILSAFE_SPECIFICATION.md#section-3"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the issue or improvement.
      placeholder: The documentation says X, but it should say Y...
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested Change
      description: How would you improve it?
    validations:
      required: false

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I would be willing to submit a PR for this change
          required: false
