name: OpenVSX Catchup Publish (manual)

# One-shot workflow for publishing a specific historical version to OpenVSX
# only, without touching VS Code Marketplace. Used to align OpenVSX with
# VS Code Marketplace when a prior version was direct-vsce-published without
# a matching `ovsx publish` (e.g., v5.0.0 catch-up per
# project_v5_0_0_openvsx_alignment.md).
#
# Bypasses release.yml's tag-on-main check and dual-publish behavior. Only
# OpenVSX is touched.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 5.0.0)'
        required: true
        type: string
      ref:
        description: 'Git ref/SHA to checkout and build from'
        required: true
        type: string

jobs:
  build-and-publish:
    name: Build at ref + publish to OpenVSX
    runs-on: ubuntu-latest
    steps:
      - name: Checkout at specified ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify package.json version matches input
        run: |
          PKG_VERSION=$(node -p "require('./FailSafe/extension/package.json').version")
          echo "package.json version: $PKG_VERSION"
          echo "requested version: ${{ inputs.version }}"
          if [ "$PKG_VERSION" != "${{ inputs.version }}" ]; then
            echo "::error::Version mismatch: package.json reports $PKG_VERSION but workflow input requested ${{ inputs.version }}"
            exit 1
          fi

      - name: Install dependencies
        working-directory: FailSafe/extension
        run: npm ci

      - name: Build VSIX
        working-directory: FailSafe/extension
        run: |
          npm run compile
          npm run bundle
          npx --yes @vscode/vsce package --no-yarn --out "mythologiq-failsafe-${{ inputs.version }}.vsix"
          ls -la "mythologiq-failsafe-${{ inputs.version }}.vsix"

      - name: Publish to OpenVSX
        working-directory: FailSafe/extension
        env:
          OVSX_PAT: ${{ secrets.OVSX_TOKEN }}
        run: |
          npx --yes ovsx publish "mythologiq-failsafe-${{ inputs.version }}.vsix"
          echo "Published v${{ inputs.version }} to OpenVSX"

      - name: Upload built VSIX as artifact
        uses: actions/upload-artifact@v4
        with:
          name: mythologiq-failsafe-${{ inputs.version }}-openvsx
          path: FailSafe/extension/mythologiq-failsafe-${{ inputs.version }}.vsix
          retention-days: 90
