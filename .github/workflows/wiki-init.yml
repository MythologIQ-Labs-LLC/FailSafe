name: Initialize Wiki

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  init-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Checkout wiki
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}.wiki
          path: wiki

      - name: Copy wiki content
        run: |
          WIKI_SRC="docs/wiki"
          WIKI_DEST="wiki"

          if [ -d "$WIKI_SRC" ]; then
            cp -v "$WIKI_SRC"/*.md "$WIKI_DEST/"
          fi

      - name: Commit and push wiki
        working-directory: wiki
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Populate FailSafe Wiki"
            git push
          fi
